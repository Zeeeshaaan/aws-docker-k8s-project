apiVersion: apps/v1
kind: Deployment

metadata:
  name: node-k8s-deployment

spec:
  replicas: 1

  selector:
    matchLabels:
      app: node-k8s-app

  template:
    metadata:
      labels:
        app: node-k8s-app

    spec:
      imagePullSecrets:
      - name: ecr-secret

      containers:
      - name: node-k8s-container
        image: 228235827513.dkr.ecr.us-east-1.amazonaws.com/node-k8s-app:latest

        ports:
        - containerPort: 3000